<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }
    </style>

</head>

<body class="d-flex justify-content-center align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6 col-sm-10">
                <div class="card shadow-lg text-center p-4 rounded-4">
                    <h2 class="fw-bold mb-3">🌤 Weather App</h2>
                    <div class="input-group mb-3">
                        <input type="text" id="cityInput" class="form-control" placeholder="Enter city name">
                        <button class="btn btn-primary" id="searchBtn">Search</button>
                    </div>

                    <p class="text-danger d-none" id="error"></p>

                    <div id="weatherBox" class="d-none">

                        <img id="weatherIcon" class="img-fluid mb-2" width="120">

                        <h1 id="temp" class="fw-bold"></h1>
                        <h4 id="city"></h4>
                        <p id="description" class="text-muted"></p>

                        <div class="row mt-4">

                            <div class="col">
                                <div class="bg-light p-3 rounded">
                                    <h5 id="humidity"></h5>
                                    <p class="mb-0 text-muted">Humidity</p>
                                </div>
                            </div>

                            <div class="col">
                                <div class="bg-light p-3 rounded">
                                    <h5 id="wind"></h5>
                                    <p class="mb-0 text-muted">Wind</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>

let apikey = "12b5a64538b37c2afda430d7c8b2f527";

const cityInput = document.getElementById("cityInput");
const searchBtn = document.getElementById("searchBtn");
const error = document.getElementById("error");
const weatherBox = document.getElementById("weatherBox");
const weatherIcon = document.getElementById("weatherIcon");

const temp = document.getElementById("temp");
const city = document.getElementById("city");
const description = document.getElementById("description");
const humidity = document.getElementById("humidity");
const wind = document.getElementById("wind");


async function getWeather(cityName){

    try{

        let apiurl = `https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=${apikey}&units=metric`;

        const response = await fetch(apiurl);

        if(!response.ok){
            throw new Error("City not found");
        }

        const data = await response.json();

        city.innerText = data.name;
        temp.innerText = data.main.temp + "°C";
        description.innerText = data.weather[0].description;

        humidity.innerText = data.main.humidity + "%";
        wind.innerText = data.wind.speed + " km/h";

        const iconCode = data.weather[0].icon;
        weatherIcon.src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;

        weatherBox.classList.remove("d-none");
        error.classList.add("d-none");

    }catch(err){

        weatherBox.classList.add("d-none");
        error.classList.remove("d-none");
        error.innerText = "City not found";

    }

}


searchBtn.addEventListener("click", () => {

    const cityName = cityInput.value.trim();

    if(cityName === ""){
        error.innerText = "Please enter city name";
        error.classList.remove("d-none");
        return;
    }

    getWeather(cityName);

});


cityInput.addEventListener("keydown", (event) => {

    if(event.key === "Enter"){
        searchBtn.click();
    }

});

</script>

</body>

</html>
